name: Deploy backend to VM

on:
  push:
    branches: [main]
    # Only redeploy when backend-relevant files change. Remove this
    # whole `paths` block if you want EVERY push to main to redeploy.
    paths:
      - 'apps/server/**'
      - 'packages/api/**'
      - 'packages/db/**'
      - 'packages/env/**'
      - 'packages/config/**'
      - 'pnpm-lock.yaml'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy-backend.yml'

# Don't let two deploys run at once if you push twice quickly.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd ~/platform
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy-backend.sh
